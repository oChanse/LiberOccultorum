<div class="biblioteca-container" id="bibliotecaContainer">
    <!-- Cabeçalho com busca e filtros -->
    <div class="biblioteca-header">
        <div class="header-top">
            <h1 class="biblioteca-titulo">
                <i class="fas fa-scroll"></i>
                A Biblioteca Oculta
            </h1>
            <div class="global-progress" id="globalProgress">
                <span class="progress-label">Progresso</span>
                <div class="progress-bar-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="globalProgressFill" style="width:0%"></div>
                    </div>
                    <span class="progress-text" id="globalProgressText">0%</span>
                </div>
            </div>
        </div>

        <div class="header-controls">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchStudies" placeholder="Buscar estudos...">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">
                    <i class="fas fa-layer-group"></i> Todos
                </button>
                <button class="filter-btn" data-filter="favorites">
                    <i class="fas fa-star"></i> Favoritos
                </button>
                <button class="filter-btn" data-filter="completed">
                    <i class="fas fa-check-circle"></i> Concluídos
                </button>
                <button class="filter-btn" data-filter="unread">
                    <i class="fas fa-clock"></i> Não lidos
                </button>
            </div>
        </div>
    </div>

    <!-- Grid de categorias (cada categoria é um card expansível) -->
    <div class="categorias-grid" id="categoriasGrid"></div>

    <!-- Visualização de estudo em tela cheia -->
    <div class="estudo-visualizacao hidden" id="estudoVisualizacao">
        <button class="btn-voltar" id="btnVoltar">
            <i class="fas fa-arrow-left"></i>
            Voltar à Biblioteca
        </button>
        <div class="estudo-wrapper" id="estudoWrapper"></div>
        <div class="estudo-navegacao" id="estudoNavegacao">
            <button class="nav-btn prev" id="navPrev" disabled>
                <i class="fas fa-chevron-left"></i>
                <span>Anterior</span>
            </button>
            <span class="nav-indicator" id="navIndicator"></span>
            <button class="nav-btn next" id="navNext">
                <span>Próximo</span>
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>
</div>
